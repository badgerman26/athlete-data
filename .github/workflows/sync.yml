name: Section 11 Master Sync
on:
  schedule:
    - cron: '*/10 * * * *' # Post-ride check
    - cron: '0 8 * * *'    # 8 AM Morning Wellness
  workflow_dispatch:

jobs:
  sync-and-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Master Sync
        env:
          INTERVALS_ID: ${{ secrets.INTERVALS_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python sync.py

      - name: Commit and Push Data
        run: |
          git config --global user.name "Section 11 Bot"
          git config --global user.email "bot@section11.com"
          git add latest.json activities.csv latest_report.txt
          git commit -m "Update training data [skip ci]" || echo "No changes"
          git push

      - name: Send Email to Robbie
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Section 11: Coach Report Audit"
          to: robbie.whittaker@gmail.com
          from: "Section 11 Bot"
          body: file://latest_report.txt
