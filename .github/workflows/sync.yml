name: Section 11 Auto-Sync & Email
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync-and-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Master Sync and Check for Changes
        id: sync
        env:
          INTERVALS_ID: ${{ secrets.INTERVALS_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          # 1. Fingerprint current activity file before sync
          [ -f activities.csv ] && md5sum activities.csv > old_hash.txt || echo "none" > old_hash.txt
          
          # 2. Run the actual script (generates latest.json)
          python sync.py
          
          # 3. Fingerprint after sync
          md5sum activities.csv > new_hash.txt
          
          # 4. Detect changes
          if ! cmp -s old_hash.txt new_hash.txt; then
            echo "NEW_DATA=true" >> $GITHUB_ENV
            echo "Activity change detected."
          else
            echo "No activity change detected."
          fi

      - name: Send Section 11 Report
        # Fire if new data is found OR if you manually click 'Run Workflow'
        if: env.NEW_DATA == 'true' || github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Section 11: Workout Validation"
          to: robbie.whittaker@gmail.com
          from: "Section 11 Audit Bot"
          body: "New activity data processed for Athlete i156193. See attached Section 11 JSON for metrics."
          attachments: latest.json
