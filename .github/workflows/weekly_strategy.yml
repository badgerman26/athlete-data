name: Coach Tony Sunday Strategy

on:
  schedule:
    # This runs at 18:00 (6:00 PM) UTC ONLY on Day 0 (Sunday)
    - cron: '0 18 * * 0'
  workflow_dispatch: 

jobs:
  weekly_audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run Coach Tony Weekly Script
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python weekly_strategy.py
        
      # --- REPLACE WITH YOUR EMAIL ACTION ---
      - name: Send Weekly Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Coach Tony: Sunday Strategy & Etape Simulator"
          to: ${{ secrets.YOUR_EMAIL_ADDRESS }}
          from: Coach Tony AI
          body: file://weekly_report.txt
