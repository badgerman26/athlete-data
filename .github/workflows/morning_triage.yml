name: Coach Tony Morning Triage

on:
  schedule:
    # This runs at 8:00 AM UTC every single day
    - cron: '0 8 * * *'
  workflow_dispatch: # Keeps the manual 'Run workflow' button just in case

jobs:
  morning_audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run Coach Tony Morning Script
        env:
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
        run: python morning_wellness.py
        
      # --- REPLACE THIS WITH YOUR EMAIL ACTION ---
      # (Use the same email step you used for sync.py, 
      # but make sure it reads from 'morning_report.txt' instead of 'latest_report.txt')
      - name: Send Morning Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Coach Tony: Morning Triage"
          to: ${{ secrets.YOUR_EMAIL_ADDRESS }}
          from: Coach Tony AI
          body: file://morning_report.txt
